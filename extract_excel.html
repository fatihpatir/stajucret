<!DOCTYPE html>
<html>
<head><script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script></head>
<body>
<input type="file" id="f" accept=".xlsx, .xls">
<textarea id="out"></textarea>
<script>
document.getElementById('f').onchange = (e) => {
    let file = e.target.files[0];
    let reader = new FileReader();
    reader.onload = function(e) {
        let data = new Uint8Array(e.target.result);
        let workbook = XLSX.read(data, {type: 'array'});
        let firstSheetName = workbook.SheetNames[0];
        let worksheet = workbook.Sheets[firstSheetName];
        let json = XLSX.utils.sheet_to_json(worksheet, {header: 1, defval: ""});
        document.getElementById('out').value = JSON.stringify(json, null, 2);
    };
    reader.readAsArrayBuffer(file);
};
</script>
</body>
</html>
